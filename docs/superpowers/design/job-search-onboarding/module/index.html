<!DOCTYPE html>
<html lang="en" data-theme="forest">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jarvis — Job Search</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; min-height: 100%; }
  body { background: var(--paper); color: var(--ink); font-family: var(--font-text); }
  #root { min-height: 100vh; }
  .mod { max-width: 1080px; margin: 0 auto; padding: 40px 40px 96px; position: relative; }
  .mast { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; }
  .mast__id { display: flex; align-items: center; gap: 16px; }
  .mast__glyph { width: 52px; height: 52px; border-radius: 8px; background: var(--accent); color: var(--accent-ink); display: flex; align-items: center; justify-content: center; flex: none; }
  .mast__eyebrow { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 6px; }
  .mast__title { font-family: var(--font-display); font-weight: 800; font-size: 40px; letter-spacing: -0.03em; text-transform: uppercase; line-height: 0.9; margin: 0; color: var(--ink); }
  .mast__status { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); padding-top: 6px; }
  .mast__dot { width: 6px; height: 6px; border-radius: 999px; background: var(--accent); }
  .tabs { display: flex; gap: 4px; margin: 30px 0 30px; border-bottom: 1px solid var(--line); }
  .tab { all: unset; cursor: pointer; font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); padding: 12px 16px; position: relative; }
  .tab:hover { color: var(--ink-2); }
  .tab.on { color: var(--ink); }
  .tab.on::after { content: ""; position: absolute; left: 12px; right: 12px; bottom: -1px; height: 3px; background: var(--gold); }
  .dock { position: fixed; right: 20px; bottom: 18px; z-index: 40; display: flex; align-items: center; gap: 10px; background: color-mix(in srgb, var(--surface) 94%, transparent); border: 1px solid var(--line); border-radius: 999px; padding: 7px 12px; box-shadow: var(--shadow-pop); backdrop-filter: blur(6px); }
  .dock label { font-family: var(--font-mono); font-size: 8.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); }
  .sw { all: unset; cursor: pointer; width: 17px; height: 17px; border-radius: 999px; border: 2px solid transparent; }
  .sw.on { box-shadow: 0 0 0 2px var(--surface), 0 0 0 4px var(--ink); }
  .dock__div { width: 1px; height: 18px; background: var(--line); }
  .icon-btn { all: unset; cursor: pointer; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; color: var(--ink-2); }
  .icon-btn:hover { background: var(--oat-lo); }
  a { color: var(--accent); text-decoration: none; } a:hover { color: var(--accent-hover); text-decoration: underline; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="icon.js"></script>
  <script type="text/babel" src="kit.jsx"></script>
  <script type="text/babel" src="JobsMatches.jsx"></script>
  <script type="text/babel" src="JobsOverview.jsx"></script>
  <script type="text/babel" src="JobsProfile.jsx"></script>
  <script type="text/babel" src="JobsMonitors.jsx"></script>
  <script type="text/babel">
    const Ic = window.Ic;
    const THEMES = [["forest", "#294b39"], ["sage", "#4a5d3a"], ["canyon", "#8a4b2b"], ["teal", "#2f6d6a"], ["dusk", "#4b4a63"]];
    const TABS = [["matches", "Matches"], ["overview", "Overview"], ["profile", "Profile"], ["monitors", "Monitors"]];

    function App() {
      const [tab, setTab] = React.useState("matches");
      const [theme, setTheme] = React.useState("forest");
      const [dark, setDark] = React.useState(false);
      React.useEffect(() => { document.documentElement.setAttribute("data-theme", theme); }, [theme]);
      React.useEffect(() => {
        if (dark) document.documentElement.setAttribute("data-mode", "dark");
        else document.documentElement.removeAttribute("data-mode");
      }, [dark]);

      let Screen;
      if (tab === "overview") Screen = <window.JobsOverview onGoMatches={() => setTab("matches")} />;
      else if (tab === "profile") Screen = <window.JobsProfile />;
      else if (tab === "monitors") Screen = <window.JobsMonitors />;
      else Screen = <window.JobsMatches />;

      return (
        <div className="mod pp-tooth">
          <header className="mast">
            <div className="mast__id">
              <div className="mast__glyph"><Ic n="Briefcase" s={25} /></div>
              <div>
                <p className="mast__eyebrow">Jarvis · Module</p>
                <h1 className="mast__title">Job Search</h1>
              </div>
            </div>
            <div className="mast__status"><span className="mast__dot" />Monitoring on · next run 7:00 AM</div>
          </header>

          <nav className="tabs">
            {TABS.map(([id, label]) => (
              <button key={id} className={`tab ${tab === id ? "on" : ""}`} onClick={() => setTab(id)}>{label}</button>
            ))}
          </nav>

          <main key={tab}>{Screen}</main>

          <div className="dock">
            <label>Theme</label>
            {THEMES.map(([id, hex]) => (
              <button key={id} className={`sw ${theme === id ? "on" : ""}`} style={{ background: hex }} title={id} onClick={() => setTheme(id)} />
            ))}
            <span className="dock__div" />
            <button className="icon-btn" title="Toggle dark" onClick={() => setDark((d) => !d)}><Ic n={dark ? "Sun" : "Moon"} s={16} /></button>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
