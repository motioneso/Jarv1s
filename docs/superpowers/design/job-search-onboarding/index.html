<!DOCTYPE html>
<html lang="en" data-theme="forest">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jarvis — Job Search setup</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--font-text); }
  #root { min-height: 100%; }
  .app-frame { display: grid; grid-template-columns: var(--rail-width) 1fr; height: 100vh; }
  .workspace { display: flex; flex-direction: column; min-width: 0; }
  .topbar { display: flex; align-items: center; gap: 16px; padding: 16px 34px; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--paper) 92%, transparent); }
  .topbar__titles { display: flex; flex-direction: column; }
  .topbar__title { font-family: var(--font-display); font-weight: 800; font-size: 19px; text-transform: uppercase; letter-spacing: 0.01em; line-height: 1; }
  .topbar__sub { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); margin-top: 4px; }
  .topbar__actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .swatches { display: flex; align-items: center; gap: 7px; margin-right: 6px; }
  .swatches label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); margin-right: 2px; }
  .swatch { width: 20px; height: 20px; border-radius: 999px; border: 2px solid transparent; cursor: pointer; padding: 0; }
  .swatch.on { box-shadow: 0 0 0 2px var(--paper), 0 0 0 4px var(--ink); }
  .icon-btn { all: unset; cursor: pointer; width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); color: var(--ink-2); }
  .icon-btn:hover { background: var(--oat-lo); }
  .content { flex: 1; min-height: 0; padding: 22px 34px 24px; display: flex; }

  .ob2 { flex: 1; min-height: 0; display: grid; grid-template-columns: 1fr 320px; gap: 30; }
  .ob2 { gap: 30px; }
  .ob2-chat { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .ob2-head { padding-bottom: 16px; margin-bottom: 4px; border-bottom: 3px solid var(--ink); }
  .ob2-log { flex: 1; min-height: 0; overflow-y: auto; padding: 20px 8px 4px 2px; }
  .ob2-composer { display: flex; align-items: center; gap: 10px; padding-top: 16px; margin-top: 8px; border-top: 1px solid var(--line); }
  a { color: var(--accent); text-decoration: none; } a:hover { color: var(--accent-hover); text-decoration: underline; }
  @keyframes obtype { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="../job-search/icon.js"></script>
  <script type="text/babel" src="../job-search/kit.jsx"></script>
  <script type="text/babel" src="JobsOnboarding.jsx"></script>
  <script type="text/babel">
    const { NavRail } = window.JarvisParkPressDesignSystem_0501fa;
    const Ic = window.Ic;
    const THEMES = [["forest", "#294b39"], ["sage", "#4a5d3a"], ["canyon", "#8a4b2b"], ["teal", "#2f6d6a"], ["dusk", "#4b4a63"]];

    function App() {
      const [theme, setTheme] = React.useState("forest");
      const [dark, setDark] = React.useState(false);
      React.useEffect(() => { document.documentElement.setAttribute("data-theme", theme); }, [theme]);
      React.useEffect(() => {
        if (dark) document.documentElement.setAttribute("data-mode", "dark");
        else document.documentElement.removeAttribute("data-mode");
      }, [dark]);

      const sections = [
        { items: [{ id: "today", label: "Today", icon: <Ic n="House" s={17} />, count: 27 }] },
        { label: "Plan", items: [
          { id: "tasks", label: "Tasks", icon: <Ic n="SquareCheck" s={17} />, count: 8 },
          { id: "calendar", label: "Calendar", icon: <Ic n="CalendarDays" s={17} />, count: 4 },
          { id: "notes", label: "Notes", icon: <Ic n="FileText" s={17} /> }
        ]},
        { label: "Modules", items: [
          { id: "finance", label: "Finance", icon: <Ic n="Landmark" s={17} />, count: 3 },
          { id: "jobsearch", label: "Job Search", icon: <Ic n="Briefcase" s={17} /> }
        ]},
        { label: "You", items: [
          { id: "knowsme", label: "Profile", icon: <Ic n="UserRound" s={17} /> }
        ]}
      ];

      return (
        <div className="app-frame pp-tooth">
          <NavRail sections={sections} activeId="jobsearch" onNavigate={() => {}} user={{ name: "Ben", edition: "Personal Edition" }} />
          <div className="workspace">
            <header className="topbar">
              <div className="topbar__titles">
                <span className="topbar__title">Job Search</span>
                <span className="topbar__sub">Setting up · first run</span>
              </div>
              <div className="topbar__actions">
                <div className="swatches">
                  <label>Palette</label>
                  {THEMES.map(([id, hex]) => (
                    <button key={id} className={`swatch ${theme === id ? "on" : ""}`} style={{ background: hex }} title={id} onClick={() => setTheme(id)} />
                  ))}
                </div>
                <button className="icon-btn" title="Toggle dark" onClick={() => setDark((d) => !d)}><Ic n={dark ? "Sun" : "Moon"} s={18} /></button>
              </div>
            </header>
            <main className="content">
              <window.JobsOnboarding />
            </main>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
