services:
  postgres:
    image: postgres:17-alpine
    container_name: jarv1s-auth-rls-spike-postgres
    environment:
      POSTGRES_DB: jarv1s_spike
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jarv1s_spike"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
