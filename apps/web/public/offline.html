<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>Jarv1s Offline</title>
    <style>
      :root {
        color: #172026;
        background: #f7f8fa;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        border: 1px solid #d9dee3;
        border-radius: 8px;
        background: #ffffff;
        padding: 1.5rem;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
      }

      p {
        margin: 0;
        color: #5d6874;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>Reconnect and refresh to continue.</p>
    </main>
  </body>
</html>
