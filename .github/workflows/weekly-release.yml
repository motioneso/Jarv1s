name: weekly-release

on:
  schedule:
    # GitHub cron is UTC. The hour guard keeps this at 09:00 Pacific across DST.
    - cron: "0 16 * * 5"
    - cron: "0 17 * * 5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: weekly-release
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.clock.outputs.run }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: Keep scheduled runs at 09:00 Pacific
        id: clock
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" != "schedule" || "$(TZ=America/Los_Angeles date +%H)" == "09" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check generator
        if: steps.clock.outputs.run == 'true'
        run: node scripts/generate-weekly-release.mjs --self-test
      - name: Generate report
        if: steps.clock.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/generate-weekly-release.mjs
      - name: Commit report archive
        if: steps.clock.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/releases
          if git diff --cached --quiet; then
            echo "Report is already current"
          else
            git commit -m "docs(release): publish weekly delivery report"
            git push
          fi
      - uses: actions/configure-pages@v5
        if: steps.clock.outputs.run == 'true'
      - uses: actions/upload-pages-artifact@v3
        if: steps.clock.outputs.run == 'true'
        with:
          path: docs/releases

  deploy:
    if: needs.generate.outputs.publish == 'true'
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy report
        id: deployment
        uses: actions/deploy-pages@v4
