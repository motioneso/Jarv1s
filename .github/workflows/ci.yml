name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Verify foundation and app
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start database
        run: pnpm db:up

      - name: Verify foundation
        run: pnpm verify:foundation

      - name: Verify release hardening
        run: pnpm test:release-hardening

      - name: Audit release hardening
        run: pnpm audit:release-hardening

      - name: Build web
        run: pnpm build:web

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: pnpm test:e2e

      - name: Stop database
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

  compose-smoke:
    name: Compose deployment smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      JARVIS_API_PORT: "3099"
      JARVIS_WEB_PORT: "5180"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Compose smoke
        run: pnpm smoke:compose -- --api-port 3099

      - name: Stop Compose stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

  prod-compose-smoke:
    name: Prod compose deployment smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Assert .dockerignore excludes the secrets env file (before it exists)
        run: |
          grep -q '^infra/env.production.local$' .dockerignore \
            || { echo "::error::.dockerignore must explicitly exclude infra/env.production.local before the smoke writes it"; exit 1; }
      - name: Write smoke env file
        run: |
          cat > infra/env.production.local <<'EOF'
          NODE_ENV=production
          POSTGRES_PASSWORD=postgres
          JARVIS_BOOTSTRAP_DATABASE_URL=postgres://postgres:postgres@postgres:5432/jarv1s
          JARVIS_MIGRATION_DATABASE_URL=postgres://jarvis_migration_owner:ci-migration-pw@postgres:5432/jarv1s
          JARVIS_APP_DATABASE_URL=postgres://jarvis_app_runtime:ci-app-pw@postgres:5432/jarv1s
          JARVIS_AUTH_DATABASE_URL=postgres://jarvis_auth_runtime:ci-auth-pw@postgres:5432/jarv1s
          JARVIS_WORKER_DATABASE_URL=postgres://jarvis_worker_runtime:ci-worker-pw@postgres:5432/jarv1s
          BETTER_AUTH_SECRET=smoke-only-not-a-real-secret-0000000000
          JARVIS_CONNECTOR_SECRET_KEY=00000000000000000000000000000000
          JARVIS_AI_SECRET_KEY=11111111111111111111111111111111
          JARVIS_MODULE_CREDENTIAL_SECRET_KEY=22222222222222222222222222222222
          JARVIS_CLI_RUNNER_RPC_SECRET=ci-smoke-only-not-real
          JARVIS_EMBED_PROVIDER=stub
          EOF
      - name: Run prod compose smoke (builds images + in-image migrate)
        env:
          JARVIS_IMAGE_TAG: ci-${{ github.run_id }}
          # Compose resolves a service `env_file:` relative to the compose file dir
          # (infra/), so this is infra-relative — NOT ./infra/... (which would become
          # infra/infra/... and fail). Codex deploy-code R1 #1.
          JARVIS_ENV_FILE: ./env.production.local
          # POSTGRES_PASSWORD + JARVIS_CLI_RUNNER_RPC_SECRET are Compose INTERPOLATION
          # vars (env_file does not feed them); the prod Compose requires them (`:?`),
          # so set them in the shell env.
          POSTGRES_PASSWORD: postgres
          JARVIS_CLI_RUNNER_RPC_SECRET: ci-smoke-only-not-real
        run: |
          pnpm smoke:compose:prod
      - name: Stop prod compose stack
        if: always()
        run: JARVIS_IMAGE_TAG=ci-${{ github.run_id }} JARVIS_ENV_FILE=./env.production.local POSTGRES_PASSWORD=postgres JARVIS_CLI_RUNNER_RPC_SECRET=ci-smoke-only-not-real docker compose -p jarv1s-prod-smoke -f infra/docker-compose.prod.yml down -v

  publish:
    name: Build and publish images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [verify, compose-smoke, prod-compose-smoke]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Pre-pull BuildKit image
        run: |
          for attempt in 1 2 3; do
            if docker pull moby/buildkit:buildx-stable-1; then
              exit 0
            fi
            sleep $((attempt * 15))
          done
          docker pull moby/buildkit:buildx-stable-1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "image_tags=ghcr.io/motioneso/jarv1s:${VERSION}" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            echo "image_tags=ghcr.io/motioneso/jarv1s:edge" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "image_tags=ghcr.io/motioneso/jarv1s:pr-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (and push on tag/main) Jarv1s image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.push == 'true' }}
          tags: ${{ steps.tags.outputs.image_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
