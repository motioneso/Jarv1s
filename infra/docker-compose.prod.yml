# Jarv1s production Compose: one Postgres container and one Jarv1s container.
# The Jarv1s supervisor prepares runtime dirs, runs migrations, then starts the
# internal cli-runner RPC server, worker, and API. The API serves the Vite build.
#
# First run:
#   JARVIS_IMAGE_TAG=v0.1.0 POSTGRES_PASSWORD=setup JARVIS_CLI_RUNNER_RPC_SECRET=setup \
#     docker compose -p jarv1s-prod -f docker-compose.prod.yml --profile setup run --rm setup
#   docker compose -p jarv1s-prod -f docker-compose.prod.yml \
#     --env-file ./env.production.local up -d
# Notes-enabled deploys must also pass `-f docker-compose.notes.yml`; it mounts
# JARVIS_NOTES_VAULT_HOST_PATH at the fixed in-container /data/external-notes path.
#
# Manual migration recovery:
#   docker compose -p jarv1s-prod -f docker-compose.prod.yml --env-file ./env.production.local \
#     --profile ops run --rm migrate
#
# Reconcile modules (download/install/purge; after placing/removing files under the modules dir):
#   docker compose -p jarv1s-prod -f docker-compose.prod.yml --env-file ./env.production.local \
#     --profile ops run --rm module-install

x-app-env-file: &app-env-file
  env_file:
    - path: ${JARVIS_ENV_FILE:-./env.production.local}
      required: false

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: jarv1s
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD (shell env or --env-file; env_file alone does not interpolate)}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jarv1s"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - jarv1s-postgres-data:/var/lib/postgresql/data
    networks:
      - jarv1s
    restart: unless-stopped

  migrate:
    image: ghcr.io/motioneso/jarv1s:${JARVIS_IMAGE_TAG:?set JARVIS_IMAGE_TAG to a published version tag}
    build:
      context: ..
      dockerfile: Dockerfile
    <<: *app-env-file
    command: ["node_modules/.bin/tsx", "scripts/migrate.ts"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["ops"]
    networks:
      - jarv1s

  module-install:
    image: ghcr.io/motioneso/jarv1s:${JARVIS_IMAGE_TAG:?set JARVIS_IMAGE_TAG to a published version tag}
    build:
      context: ..
      dockerfile: Dockerfile
    <<: *app-env-file
    # #964: was scripts/module-install.ts (DB install only); reconcile is a superset —
    # purge → ensure-present → accept-staged → DB install → drift, same script boot runs.
    command: ["node_modules/.bin/tsx", "scripts/module-reconcile.ts"]
    environment:
      JARVIS_MODULES_DIR: /data/modules
    volumes:
      - jarv1s-modules:/data/modules
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["ops"]
    networks:
      - jarv1s

  seed:
    image: ghcr.io/motioneso/jarv1s:${JARVIS_IMAGE_TAG:?set JARVIS_IMAGE_TAG to a published version tag}
    build:
      context: ..
      dockerfile: Dockerfile
    # #1121: own explicit env_file list (not the shared *app-env-file anchor) — the second
    # entry is the ONLY conduit for the opt-in real-token UAT run's CLAUDE_CODE_OAUTH_TOKEN.
    # jarv1s deliberately keeps using the anchor alone and never gets this entry (see
    # tests/unit/compose-seed-real-chat-token.test.ts).
    env_file:
      - path: ${JARVIS_ENV_FILE:-./env.production.local}
        required: false
      - path: ${JARVIS_UAT_REAL_CHAT_ENV_FILE:-/dev/null}
        required: false
    # #1025/#1000: UAT-only — seeds tiered dev/test data through the same
    # in-network connections migrate/module-install use (postgres has no
    # host-published port, so this cannot run as a host-side script).
    # profiles: ["ops"] keeps this INERT on a normal `up` — it never runs
    # unless the ops profile is explicitly selected (Coordinator ruling,
    # binding). #1082: tests/uat/seed/guard.ts is the authoritative target-DB
    # gate; JARVIS_UAT_SEED_CONFIRM remains a necessary second intent check.
    # #1217: the Dockerfile has no USER directive, so without this override
    # seed runs as root and tests/uat/seed/chunks/notes.ts's vault mkdir
    # creates root-owned content. start-jarv1s.ts's prepareRuntimeDirs chown
    # only reaches /data/vaults before seed ever runs, so it can't fix this
    # after the fact — seed must run as the same uid/gid as jarv1s from the start.
    user: "${JARVIS_HOST_UID:-1000}:${JARVIS_HOST_GID:-1000}"
    command: ["node_modules/.bin/tsx", "tests/uat/seed/cli.ts"]
    environment:
      JARVIS_UAT_SEED_LEVEL: "${JARVIS_UAT_SEED_LEVEL:-bare}"
      JARVIS_UAT_SEED_EXCLUDE_CHUNKS: "${JARVIS_UAT_SEED_EXCLUDE_CHUNKS:-}"
      # Deliberately a safe empty default here, NOT :? — Compose interpolates
      # ${...} for every service BEFORE profile filtering, so a required var
      # on this ops-profile-only service would break a base `docker compose
      # up` even though seed never starts in it. The real fail-closed guard
      # is enforced at the entrypoint (tests/uat/seed/cli.ts:16), which
      # rejects anything other than exactly "1".
      JARVIS_UAT_SEED_CONFIRM: "${JARVIS_UAT_SEED_CONFIRM:-}"
    # #1025: the notes chunk writes through VaultContext at its real default
    # (getVaultBaseDir() -> /data/vaults, no env override inside the compose
    # network) — same mount path the jarv1s service uses below, so seeded
    # vault files land in the volume the UAT run actually serves from.
    volumes:
      - jarv1s-vault-data:/data/vaults
      # #1121: same project-scoped volume jarv1s mounts below — lets the opt-in
      # real-chat token this service persists become visible to jarv1s's chat launch.
      - jarv1s-cli-auth:/data/cli-auth
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["ops"]
    networks:
      - jarv1s

  jarv1s:
    image: ghcr.io/motioneso/jarv1s:${JARVIS_IMAGE_TAG:?set JARVIS_IMAGE_TAG to a published version tag}
    build:
      context: ..
      dockerfile: Dockerfile
    <<: *app-env-file
    command: ["node_modules/.bin/tsx", "scripts/start-jarv1s.ts"]
    environment:
      PORT: "3000"
      HOST: 0.0.0.0
      HF_HOME: /app/.cache/huggingface
      JARVIS_WEB_DIST_DIR: /app/apps/web/dist
      JARVIS_CLI_RUNNER_SOCKET: ${JARVIS_CLI_RUNNER_SOCKET:-/run/jarv1s/cli-runner.sock}
      JARVIS_CLI_RUNNER_RPC_SECRET: ${JARVIS_CLI_RUNNER_RPC_SECRET:?set JARVIS_CLI_RUNNER_RPC_SECRET (generated by setup; shell env or --env-file)}
      JARVIS_CLI_RUNNER_SINGLE_USER: "${JARVIS_CLI_RUNNER_SINGLE_USER:-0}"
      JARVIS_CLI_PER_USER_UID: "${JARVIS_CLI_PER_USER_UID:-0}"
      JARVIS_CLI_HOME: /data/cli-auth
      JARVIS_CLI_HOME_BASE: /data/cli-auth
      JARVIS_CLI_NEUTRAL_BASE: /data/cli-auth/chat
      JARVIS_CHAT_HOME: /data/cli-auth/chat
      JARVIS_CLI_TOOLS_PREFIX: /data/cli-tools
      NPM_CONFIG_PREFIX: /data/cli-tools
      JARVIS_HOST_UID: "${JARVIS_HOST_UID:-1000}"
      JARVIS_HOST_GID: "${JARVIS_HOST_GID:-1000}"
      JARVIS_MULTIPLEXER: tmux
      JARVIS_MCP_SERVER_URL: ${JARVIS_MCP_SERVER_URL:-http://127.0.0.1:3000/api/mcp}
      JARVIS_EMBED_PROVIDER: ${JARVIS_EMBED_PROVIDER:-local}
      JARVIS_EMBED_MODEL: ${JARVIS_EMBED_MODEL:-}
      JARVIS_MODULES_DIR: /data/modules
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 240s
    ports:
      - "${JARVIS_WEB_PORT:-1533}:3000"
    volumes:
      - jarv1s-vault-data:/data/vaults
      # Notes source mount: do not change the in-container target.
      # If JARVIS_NOTES_ROOTS=/data/external-notes, deploy with
      # `-f docker-compose.notes.yml` and set JARVIS_NOTES_VAULT_HOST_PATH
      # to the host Markdown/Obsidian folder.
      - jarv1s-model-cache:/app/.cache/huggingface
      - jarv1s-cli-tools:/data/cli-tools
      - jarv1s-cli-auth:/data/cli-auth
      - jarv1s-cli-socket:/run/jarv1s
      - jarv1s-modules:/data/modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jarv1s

  setup:
    image: ghcr.io/motioneso/jarv1s:${JARVIS_IMAGE_TAG:?set JARVIS_IMAGE_TAG to a published version tag}
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["node_modules/.bin/tsx", "scripts/setup-prod.ts"]
    command: ["/deploy"]
    volumes:
      - .:/deploy
    restart: "no"
    profiles: ["setup"]
    networks:
      - jarv1s

volumes:
  jarv1s-postgres-data:
  jarv1s-vault-data:
  jarv1s-model-cache:
  jarv1s-cli-tools:
  jarv1s-cli-auth:
  jarv1s-cli-socket:
  # #964: downloaded module packages survive image upgrades — modules are data, not image.
  jarv1s-modules:

networks:
  jarv1s:
    ipam:
      config:
        - subnet: ${JARVIS_DOCKER_SUBNET:-10.251.0.0/24}
