x-workspace-volumes: &workspace-volumes
  - ..:/workspace
  - /workspace/node_modules
  - /workspace/apps/api/node_modules
  - /workspace/apps/web/node_modules
  - /workspace/apps/worker/node_modules
  - /workspace/packages/ai/node_modules
  - /workspace/packages/auth/node_modules
  - /workspace/packages/briefings/node_modules
  - /workspace/packages/calendar/node_modules
  - /workspace/packages/chat/node_modules
  - /workspace/packages/connectors/node_modules
  - /workspace/packages/db/node_modules
  - /workspace/packages/email/node_modules
  - /workspace/packages/jobs/node_modules
  - /workspace/packages/module-registry/node_modules
  - /workspace/packages/module-sdk/node_modules
  - /workspace/packages/notes/node_modules
  - /workspace/packages/notifications/node_modules
  - /workspace/packages/settings/node_modules
  - /workspace/packages/shared/node_modules
  - /workspace/packages/tasks/node_modules

# #1059: these four service containers run a raw `node:24-bookworm-slim` image and
# `pnpm install --frozen-lockfile` directly against the mounted workspace. node-pty
# (a packages/cli-runner workspace dep) ships no linux prebuild, so pnpm compiles it
# from source via node-gyp — which needs python3/make/g++. The slim image lacks them,
# so each install must apt-install the toolchain first (these containers are ephemeral
# CI/dev smokes, discarded after the run — no cleanup needed). The Dockerfile images
# (root + apps/web) already carry this toolchain; these raw-image services didn't.
services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: jarv1s-postgres
    environment:
      POSTGRES_DB: jarv1s
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jarv1s"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - jarv1s-postgres-data:/var/lib/postgresql/data
    networks:
      - jarv1s

  greenmail:
    image: greenmail/standalone:2.1.0
    container_name: jarv1s-greenmail
    environment:
      GREENMAIL_OPTS: "-Dgreenmail.setup.test.imap -Dgreenmail.setup.test.smtp -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users.login=email -Dgreenmail.users=probe:probe-pw@greenmail.test"
    ports:
      - "3143:3143"
      - "3025:3025"
    healthcheck:
      test:
        ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/3143 && echo > /dev/tcp/127.0.0.1/3025"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - jarv1s

  migrate:
    image: node:24-bookworm-slim
    working_dir: /workspace
    volumes: *workspace-volumes
    environment:
      CI: "true"
      JARVIS_BOOTSTRAP_DATABASE_URL: postgres://postgres:postgres@postgres:5432/jarv1s
      JARVIS_MIGRATION_DATABASE_URL: postgres://jarvis_migration_owner:migration_password@postgres:5432/jarv1s
      JARVIS_APP_DATABASE_URL: postgres://jarvis_app_runtime:app_password@postgres:5432/jarv1s
      JARVIS_AUTH_DATABASE_URL: postgres://jarvis_auth_runtime:auth_password@postgres:5432/jarv1s
      JARVIS_WORKER_DATABASE_URL: postgres://jarvis_worker_runtime:worker_password@postgres:5432/jarv1s
    command: sh -c "corepack enable && apt-get update && apt-get install -y --no-install-recommends python3 make g++ && pnpm install --frozen-lockfile --store-dir /tmp/pnpm-store && pnpm db:migrate"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jarv1s

  api:
    image: node:24-bookworm-slim
    working_dir: /workspace
    volumes: *workspace-volumes
    environment:
      CI: "true"
      PORT: "3000"
      HOST: 0.0.0.0
      JARVIS_APP_DATABASE_URL: postgres://jarvis_app_runtime:app_password@postgres:5432/jarv1s
      JARVIS_AUTH_DATABASE_URL: postgres://jarvis_auth_runtime:auth_password@postgres:5432/jarv1s
    command: sh -c "corepack enable && apt-get update && apt-get install -y --no-install-recommends python3 make g++ && pnpm install --frozen-lockfile --store-dir /tmp/pnpm-store && pnpm start:api"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    ports:
      - "${JARVIS_API_PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - jarv1s

  web:
    image: node:24-bookworm-slim
    working_dir: /workspace
    volumes: *workspace-volumes
    environment:
      CI: "true"
      JARVIS_API_PROXY_TARGET: http://api:3000
    command: sh -c "corepack enable && apt-get update && apt-get install -y --no-install-recommends python3 make g++ && pnpm install --frozen-lockfile --store-dir /tmp/pnpm-store && pnpm dev:web"
    restart: unless-stopped
    ports:
      - "${JARVIS_WEB_PORT:-5173}:5173"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - jarv1s

  worker:
    image: node:24-bookworm-slim
    working_dir: /workspace
    volumes: *workspace-volumes
    environment:
      CI: "true"
      JARVIS_WORKER_DATABASE_URL: postgres://jarvis_worker_runtime:worker_password@postgres:5432/jarv1s
    command: sh -c "corepack enable && apt-get update && apt-get install -y --no-install-recommends python3 make g++ && pnpm install --frozen-lockfile --store-dir /tmp/pnpm-store && pnpm start:worker"
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - jarv1s

volumes:
  jarv1s-postgres-data:

networks:
  jarv1s:
    ipam:
      config:
        - subnet: ${JARVIS_DOCKER_SUBNET:-10.251.0.0/24}
