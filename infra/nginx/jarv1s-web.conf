# Jarv1s static-web nginx config (deployable-stack §4).
# Serves the Vite SPA bundle and reverse-proxies /api + /health to the api
# container, preserving the api's locked default-src 'none' CSP (the SPA's own
# relaxed-but-scoped CSP is set HERE on the document, never on the api origin).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so the `api` upstream is resolved at REQUEST time
    # (via the $api_upstream variable below), not at config-parse/startup time.
    # A static `proxy_pass http://api:3000` would force nginx to resolve `api` when
    # it boots — making `nginx -t` fail standalone AND making the web container
    # crash if it starts before the api is resolvable on the Compose network.
    resolver 127.0.0.11 ipv6=off valid=10s;
    set $api_upstream http://api:3000;

    # SPA document CSP: scoped to self for scripts/styles/connect; no third-party.
    # img-src must match SPA_CSP in apps/api/src/static-web.ts
    # (sync pinned by tests/unit/static-web-csp.test.ts).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://a.espncdn.com https://s.secure.espncdn.com https://cdn.arstechnica.net https://i.guim.co.uk https://ichef.bbci.co.uk https://media.npr.org https://media.wired.com https://npr.brightspotcdn.com https://platform.theverge.com https://static01.nyt.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;

    # API + health reverse proxy -> the api container on the Compose network.
    # Mirrors the dev Vite proxy target (infra/docker-compose.yml:100).
    location /api/ {
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location = /health {
        proxy_pass $api_upstream/health;
        proxy_set_header Host $host;
    }

    location /health/ {
        proxy_pass $api_upstream$request_uri;
        proxy_set_header Host $host;
    }

    # SPA history fallback: unknown paths return index.html for client routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
